<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>稀饭文案转换器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fc 0%, #dfe6f0 100%);
            color: #0f172a;
            line-height: 1.5;
            padding: 24px 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 28px;
            padding-bottom: 12px;
        }
        
        h1 {
            font-size: 1.9rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #0f5e41, #11c668);
            background-clip: text;
            -webkit-background-clip: text;
            color: #2d3748;
            letter-spacing: -0.3px;
        }
        
        .subtitle {
            color: #2c3e50;
            font-size: 0.9rem;
            background: rgba(255,255,245,0.8);
            display: inline-block;
            padding: 4px 20px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }
        
        .card {
            background-color: rgba(255, 255, 255, 0.98);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 22px -8px rgba(0, 0, 0, 0.08);
            transition: all 0.2s;
            border: 1px solid rgba(255,255,250,0.9);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
        }
        
        .card-icon {
            width: 44px;
            height: 44px;
            background: #eef7f0;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            color: #11c668;
            font-size: 1.25rem;
            flex-shrink: 0;
        }
        
        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1e293b;
        }
        
        /* 关键词区域 - 横向并列布局 */
        .keyword-section {
            margin-bottom: 24px;
        }
        
        .keyword-row {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #fbfdfe;
            border-radius: 24px;
            padding: 12px 20px;
            border: 1px solid #e2edf2;
        }
        
        .keyword-label {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #eef2ff;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            color: #02b458;
            font-size: 1rem;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .keyword-label i {
            font-size: 1.1rem;
        }
        
        .keyword-input-wrapper {
            flex: 1;
            min-width: 0;
        }
        
        #keywordInput {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid #cbd5e1;
            border-radius: 60px;
            font-size: 1rem;
            background: white;
            transition: 0.2s;
            outline: none;
            line-height: 1.4;
        }
        
        #keywordInput:focus {
            border-color: #11c668;
            box-shadow: 0 0 0 3px rgba(17,198,104,0.15);
        }
        
        #keywordInput::placeholder {
            color: #94a3b8;
            font-size: 0.95rem;
        }
        
        /* 帮助提示区域 - 保持横向并列 */
        .helper-notes {
            margin-top: 12px;
        }
        
        .helper-note {
            font-size: 0.72rem;
            color: #4b6a8b;
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            flex-wrap: nowrap;
        }
        
        .helper-note:last-child {
            margin-bottom: 0;
        }
        
        .helper-note i {
            color: #11c668;
            margin-top: 2px;
            flex-shrink: 0;
            width: 18px;
            text-align: center;
        }
        
        .helper-note strong {
            color: #2c3e50;
        }
        
        .helper-note span {
            flex: 1;
            line-height: 1.4;
        }
        
        .weibo-badge {
            background: #fdf2f0;
            border-left: 3px solid #ff6b6b;
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-top: 12px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        
        .weibo-badge i {
            flex-shrink: 0;
            margin-top: 2px;
        }
        
        textarea {
            width: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 22px;
            padding: 18px;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 180px;
            transition: all 0.2s;
            line-height: 1.55;
            background: #eef2ff;
        }
        
        textarea:focus {
            outline: none;
            border-color: #11c668;
            box-shadow: 0 0 0 3px rgba(17,198,104,0.12);
        }
        
        .input-container {
            position: relative;
        }
        
        .char-count {
            position: absolute;
            bottom: 14px;
            right: 18px;
            font-size: 0.7rem;
            color: #94a3b8;
            background: rgba(255,255,245,0.9);
            padding: 2px 10px;
            border-radius: 20px;
            backdrop-filter: blur(2px);
            pointer-events: none;
        }
        
        .controls {
            display: flex;
            gap: 16px;
            margin: 12px 0 8px;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            padding: 14px 16px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: #11c668;
            color: white;
            box-shadow: 0 4px 8px rgba(17,198,104,0.25);
        }
        
        .btn-primary:hover {
            background: #0d9c50;
            transform: translateY(-2px);
        }
        
        /* 清空按钮 - 最初的颜色（红色渐变） */
        .btn-secondary {
            background: linear-gradient(135deg, #e74c3c, #e67e22);
            color: white;
        }
        
        .btn-secondary:hover {
            background: linear-gradient(135deg, #d62c1a, #d35f0f);
            transform: translateY(-2px);
        }
        
        footer {
            text-align: center;
            margin-top: 32px;
            color: #5b6e8c;
            font-size: 0.8rem;
            padding-top: 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        
        /* 移动端优化 - 保持所有元素横向并列 */
        @media (max-width: 560px) {
            body {
                padding: 16px;
            }
            
            .card {
                padding: 18px;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .controls button {
                width: 100%;
            }
            
            .card-title {
                font-size: 1.1rem;
            }
            
            /* 移动端保持横向布局 */
            .keyword-row {
                gap: 12px;
                padding: 10px 16px;
            }
            
            .keyword-label {
                padding: 10px 18px;
                font-size: 0.9rem;
            }
            
            .keyword-label i {
                font-size: 1rem;
            }
            
            #keywordInput {
                padding: 12px 16px;
                font-size: 0.95rem;
            }
            
            #keywordInput::placeholder {
                font-size: 0.9rem;
            }
            
            /* 帮助提示保持横向并列 */
            .helper-note {
                font-size: 0.65rem;
                gap: 6px;
            }
            
            .helper-note i {
                width: 16px;
                font-size: 0.65rem;
            }
            
            .weibo-badge {
                font-size: 0.65rem;
                padding: 8px 10px;
                gap: 6px;
            }
            
            textarea {
                font-size: 0.9rem;
                padding: 14px;
                min-height: 150px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .subtitle {
                font-size: 0.8rem;
            }
        }
        
        /* 超小屏幕调整间距 */
        @media (max-width: 400px) {
            .keyword-row {
                gap: 10px;
                padding: 8px 12px;
            }
            
            .keyword-label {
                padding: 8px 14px;
                font-size: 0.85rem;
            }
            
            .keyword-label i {
                font-size: 0.9rem;
            }
            
            #keywordInput {
                padding: 10px 14px;
                font-size: 0.9rem;
            }
            
            .helper-note {
                font-size: 0.6rem;
                gap: 5px;
            }
        }
        
        @keyframes gentleFlash {
            0% { background-color: rgba(17,198,104,0.1); transform: scale(0.99);}
            100% { background-color: transparent; transform: scale(1);}
        }
        
        .convert-flash {
            animation: gentleFlash 0.35s ease forwards;
        }
        
        .copy-notification {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(90px);
            background: #11c668;
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            opacity: 0;
            font-weight: 500;
            backdrop-filter: blur(8px);
            background: rgba(17,198,104,0.94);
            pointer-events: none;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        
        @media (max-width: 480px) {
            .copy-notification {
                font-size: 0.8rem;
                padding: 10px 20px;
                white-space: nowrap;
            }
        }
        
        .copy-notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        .badge-feature {
            background: #ecfdf5;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.7rem;
            color: #0b6e41;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        @media (max-width: 560px) {
            .badge-feature {
                font-size: 0.6rem;
                padding: 5px 10px;
            }
        }
        
        code {
            background: #f0f0f0;
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>稀饭文案转换器</h1>
    </header>

    <!-- 关键词输入区块 - 横向并列布局 -->
    <div class="card" style="padding-bottom: 16px;">
        <div class="keyword-section">
            <div class="keyword-row">
                <div class="keyword-label">
                    <i class="fas fa-tag"></i> 
                    <span>关键词分段</span>
                </div>
                <div class="keyword-input-wrapper">
                    <input type="text" id="keywordInput" placeholder="输入关键词" autocomplete="off">
                </div>
            </div>
        </div>
        
        <!-- 帮助提示区域 - 保持图标和文字横向并列 -->
        <div class="helper-notes">
            <div class="helper-note">
                <i class="fas fa-arrow-right"></i>
                <span><strong>关键词规则：</strong> 每个关键词后面添加真实换行符（不会被转成【换行】），分隔随机文案。</span>
            </div>
        </div>
    </div>

    <!-- 输入区 -->
    <div class="card">
        <div class="card-header">
            <div class="card-icon">
                <i class="fas fa-paste"></i>
            </div>
            <h2 class="card-title">输入原文案</h2>
        </div>
        <div class="input-container">
            <textarea id="originalText" placeholder="请粘贴或输入文案（自动转换）……"></textarea>
            <div class="char-count"><span id="originalCharCount">0</span> 字</div>
        </div>
    </div>

    <!-- 转换结果区 -->
    <div class="card">
        <div class="card-header">
            <div class="card-icon">
                <i class="fab fa-weibo"></i>
            </div>
            <h2 class="card-title">转换结果</h2>
        </div>
        <div class="input-container">
            <textarea id="convertedText" placeholder="结果会实时生成……" readonly></textarea>
            <div class="char-count"><span id="convertedCharCount">0</span> 字</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-primary" id="copyBtn"><i class="far fa-copy"></i> 复制结果</button>
        <button class="btn-secondary" id="clearBtn"><i class="fas fa-eraser"></i> 清空全部</button>
    </div>
    <footer>
        <div class="badge-feature"><i class="fab fa-weibo"></i> 仅用于转换为稀饭文案 </div>
    </footer>
</div>

<div class="copy-notification" id="copyNotification">
    <i class="fas fa-check-circle"></i> 复制成功
</div>

<script>
    (function() {
        const originalTextarea = document.getElementById('originalText');
        const convertedTextarea = document.getElementById('convertedText');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const originalCharSpan = document.getElementById('originalCharCount');
        const convertedCharSpan = document.getElementById('convertedCharCount');
        const copyNotification = document.getElementById('copyNotification');
        const keywordInput = document.getElementById('keywordInput');

        const WEIBO_VIDEO_REGEX = /https:\/\/video\.weibo\.com\/show\?fid=[^\s\u4e00-\u9fa5\u3000-\u303f\uff00-\uffef\u2000-\u206f，。、；：""''（）【】《》！？<>「」『』\|\n\r\t]+/g;
        
        function getAllWeiboVideoMatches(text) {
            const matches = [];
            let match;
            const regex = new RegExp(WEIBO_VIDEO_REGEX.source, 'g');
            while ((match = regex.exec(text)) !== null) {
                let rawUrl = match[0];
                rawUrl = rawUrl.replace(/[.,;:!?]$/, '');
                matches.push({
                    url: rawUrl,
                    start: match.index,
                    end: match.index + match[0].length,
                });
            }
            return matches;
        }
        
        function extractUniqueWeiboUrls(originalText) {
            const matches = getAllWeiboVideoMatches(originalText);
            const urlSet = new Set();
            const uniqueUrls = [];
            for (let m of matches) {
                if (!urlSet.has(m.url)) {
                    urlSet.add(m.url);
                    uniqueUrls.push(m.url);
                }
            }
            return uniqueUrls;
        }
        
        function removeWeiboLinksAndSurroundingLineBreaks(originalText) {
            if (!originalText) return '';
            
            const matches = getAllWeiboVideoMatches(originalText);
            if (matches.length === 0) return originalText;
            
            let processed = originalText;
            
            for (let i = matches.length - 1; i >= 0; i--) {
                const match = matches[i];
                let { start, end } = match;
                
                let beforeStart = start;
                while (beforeStart > 0 && (processed[beforeStart - 1] === '\n' || processed[beforeStart - 1] === '\r')) {
                    beforeStart--;
                }
                
                let afterEnd = end;
                while (afterEnd < processed.length && (processed[afterEnd] === '\n' || processed[afterEnd] === '\r')) {
                    afterEnd++;
                }
                
                const beforePart = processed.substring(0, beforeStart);
                const afterPart = processed.substring(afterEnd);
                processed = beforePart + afterPart;
            }
            
            processed = processed.replace(/[ ]{2,}/g, ' ');
            processed = processed.replace(/\n{3,}/g, '\n\n');
            return processed;
        }
        
        function convertLineBreaksToTag(text) {
            if (!text) return '';
            let normalized = text.replace(/\r\n|\r|\n/g, '\n');
            let result = normalized.replace(/\n/g, '【换行】');
            return result;
        }
        
        function addRealLineBreakAfterKeyword(textWithTags, keyword) {
            if (!textWithTags || !keyword || keyword.trim() === '') {
                return textWithTags;
            }
            
            const kw = keyword.trim();
            if (kw === '') return textWithTags;
            
            const escapedKw = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escapedKw})`, 'g');
            
            let result = '';
            let lastIndex = 0;
            let match;
            
            while ((match = regex.exec(textWithTags)) !== null) {
                const matchEnd = match.index + match[0].length;
                result += textWithTags.substring(lastIndex, matchEnd);
                result += '\n';
                lastIndex = matchEnd;
            }
            result += textWithTags.substring(lastIndex);
            
            result = result.replace(/\n{3,}/g, '\n\n');
            return result;
        }
        
        function getFinalConvertedText(rawInput, keyword) {
            if (!rawInput) return '';
            
            const weiboUrls = extractUniqueWeiboUrls(rawInput);
            
            let textWithoutWeiboLinks = removeWeiboLinksAndSurroundingLineBreaks(rawInput);
            
            let textWithTags = convertLineBreaksToTag(textWithoutWeiboLinks);
            
            textWithTags = textWithTags.replace(/(【换行】){3,}/g, '【换行】【换行】');
            
            let finalBody = textWithTags;
            if (keyword && keyword.trim() !== '') {
                finalBody = addRealLineBreakAfterKeyword(finalBody, keyword);
                finalBody = finalBody.replace(/^\n+/, '');
                finalBody = finalBody.replace(/\n+$/, '');
            }
            
            finalBody = finalBody.replace(/^(【换行】)+/, '');
            finalBody = finalBody.replace(/(【换行】)+$/, '');
            
            let result = finalBody;
            if (weiboUrls.length > 0) {
                if (result.trim().length > 0) {
                    result = result.trim() + '\n\n' + weiboUrls.join('\n');
                } else {
                    result = weiboUrls.join('\n');
                }
            }
            
            result = result.replace(/^\s+/, '').replace(/\s+$/, '');
            return result;
        }
        
        let debounceTimer;
        
        function updateConversion() {
            const raw = originalTextarea.value;
            const keyword = keywordInput.value;
            const converted = getFinalConvertedText(raw, keyword);
            convertedTextarea.value = converted;
            
            originalCharSpan.textContent = raw.length;
            convertedCharSpan.textContent = converted.length;
            
            const resultCard = document.querySelectorAll('.card')[2];
            if (resultCard) {
                resultCard.classList.add('convert-flash');
                setTimeout(() => resultCard.classList.remove('convert-flash'), 350);
            }
        }
        
        function handleInput() {
            if (debounceTimer) clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                updateConversion();
            }, 180);
        }
        
        originalTextarea.addEventListener('input', handleInput);
        keywordInput.addEventListener('input', handleInput);
        originalTextarea.addEventListener('paste', () => setTimeout(updateConversion, 30));
        
        function clearAll() {
            originalTextarea.value = '';
            keywordInput.value = '';
            updateConversion();
            originalTextarea.focus();
            showToast('✨ 已清空所有内容', true);
        }
        
        function copyResult() {
            const resultText = convertedTextarea.value;
            if (!resultText || resultText.trim() === '') {
                showToast('❌ 暂无内容可复制', false);
                return;
            }
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(resultText).then(() => {
                    showToast('✅ 已复制到剪贴板', true);
                }).catch(() => fallbackCopy(resultText));
            } else {
                fallbackCopy(resultText);
            }
        }
        
        function fallbackCopy(text) {
            convertedTextarea.select();
            convertedTextarea.setSelectionRange(0, 99999);
            try {
                const success = document.execCommand('copy');
                if (success) showToast('📋 复制成功', true);
                else showToast('复制失败，请手动复制', false);
            } catch (e) {
                showToast('复制异常，请手动选择', false);
            }
        }
        
        function showToast(message, isSuccess = true) {
            copyNotification.innerHTML = `<i class="fas ${isSuccess ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${message}`;
            copyNotification.style.backgroundColor = isSuccess ? '#11c668' : '#e67e22';
            copyNotification.classList.add('show');
            setTimeout(() => {
                copyNotification.classList.remove('show');
            }, 2300);
        }
        
        copyBtn.addEventListener('click', copyResult);
        clearBtn.addEventListener('click', clearAll);
        
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('touchstart', () => { btn.style.transform = 'scale(0.97)'; });
            btn.addEventListener('touchend', () => { btn.style.transform = ''; });
            btn.addEventListener('mouseleave', () => { btn.style.transform = ''; });
        });
        
        updateConversion();
    })();
</script>
</body>
</html>
